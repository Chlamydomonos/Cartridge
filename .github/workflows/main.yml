name: Generate Data

on:
  push:
    branches:
      - release

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          fetch-depth: 0 # Fetch all history to allow for proper merging

      - name: Get Last Commit Message
        id: get_commit_message
        run: echo "LAST_COMMIT_MESSAGE=$(git log -1 --pretty=%B)" >> $GITHUB_ENV

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Switch to main branch
        run: |
          git checkout main
          git pull origin main

      - name: Merge release into main
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git merge release -s ours
          git branch temp
          git reset --hard release
          git checkout temp -- src/generated
          git reset --soft temp
          git commit --amend -m "${{ env.LAST_COMMIT_MESSAGE }}: merge release into main"
          git branch -D temp
          git diff HEAD release

      - name: Run Gradle task
        run: |
          chmod +x ./gradlew
          ./gradlew runData

      - name: Commit changes
        run: |
          git add .
          STATUS_OUTPUT=$(git status --porcelain)
          STATUS_OUTPUT_LENGTH=${#STATUS_OUTPUT}
          if [[ $STATUS_OUTPUT_LENGTH -gt 0 ]]; then
            git commit -m "${{ env.LAST_COMMIT_MESSAGE }}: update generated files from release branch"
          else
            echo "No changes to commit."
          fi

      - name: Push changes
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main

      - name: Check for Release
        id: check_release
        run: |
          FIRST_LINE=$(echo "${{ env.LAST_COMMIT_MESSAGE }}" | head -n 1)
          if [[ "$FIRST_LINE" =~ ^v([0-9]+(\.[0-9]+)*)$ ]]; then
            VERSION="${BASH_REMATCH[1]}"
            echo "version=$VERSION" >> $GITHUB_ENV
            echo "create_release=true" >> $GITHUB_ENV
          else
            echo "create_release=false" >> $GITHUB_ENV
          fi

      - name: Run Gradle jar
        if: env.create_release == 'true'
        run: |
          chmod +x ./gradlew
          ./gradlew jar

      - name: Create and push tag
        if: env.create_release == 'true'
        run: |
          git tag v${{ env.version }}
          git push origin v${{ env.version }}

      - name: Create GitHub Release
        if: env.create_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          tag_name: "v${{ env.version }}"
          name: "Release v${{ env.version }}"
          files: build/libs/cartridge-${{ env.version }}.jar
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
